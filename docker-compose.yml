version: "3.9"

# Full DailyCash stack: Postgres + API + frontend PWA.
# Quick start:
#   cp .env.example .env   (edit JWT_SECRET at minimum)
#   docker compose up -d --build
#   docker compose exec api npx prisma migrate deploy
#   docker compose exec api npm run seed
# Frontend: http://localhost:8080  |  API: http://localhost:4000

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dailycash
      POSTGRES_PASSWORD: dailycash
      POSTGRES_DB: dailycash
    volumes:
      - dailycash_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailycash"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://dailycash:dailycash@db:5432/dailycash?schema=public"
      DIRECT_URL: "postgresql://dailycash:dailycash@db:5432/dailycash?schema=public"
      JWT_SECRET: "${JWT_SECRET:-change-this-in-production}"
      JWT_EXPIRES_IN: "8h"
      PORT: 4000
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
    ports:
      - "4000:4000"
    volumes:
      - dailycash_uploads:/app/uploads

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:4000}"
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  dailycash_db_data:
  dailycash_uploads:
