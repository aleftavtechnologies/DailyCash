server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unknown path falls back to index.html so
    # client-side navigation (and refreshing on a deep link) works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must never be cached, or updates won't be picked up.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
